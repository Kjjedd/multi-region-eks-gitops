name: board-app

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ${DB_NAME:-boarddb}
      MYSQL_USER: ${DB_USER:-boarduser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-boardpass}
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -prootpass"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sigwan/board-app:${APP_VERSION:-0.1.0}
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-boarduser}
      DB_PASSWORD: ${DB_PASSWORD:-boardpass}
      DB_NAME: ${DB_NAME:-boarddb}
      APP_REGION: ${APP_REGION:-seoul}
      APP_ENV: ${APP_ENV:-local}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_COMMIT: ${APP_COMMIT:-unknown}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: sigwan/board-app-nginx:${APP_VERSION:-0.1.0}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
