apiVersion: apps/v1
kind: Deployment
metadata:
  name: board-app
  namespace: board-app-eks
spec:
  replicas: 2
  selector:
    matchLabels:
      app: board-app
  template:
    metadata:
      labels:
        app: board-app
    spec:
      serviceAccountName: secret-sa
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
                secretProviderClass: aws-secrets

      containers:
        - name: board-app-container
          image: 816040392320.dkr.ecr.ap-northeast-2.amazonaws.com/board-app:1  # ECR  
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: board-app-secret
            - configMapRef:
                name: board-app-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"